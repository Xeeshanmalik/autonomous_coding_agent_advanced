server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PROXY 1: Task Synthesis Engine (DeepSeek LLM)
    location /agent/ {
        proxy_pass http://local-deepseek-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        
        # THE FIX: Give the CPU LLM up to 5 minutes to generate the first token
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # PROXY 2: Evolution Core (AutoResearch Loop)
    location /autoresearch/ {
        proxy_pass http://ai-researcher:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        
        # THE FIX: Give the python evolution loop up to 1 hour to complete
        proxy_read_timeout 3600s; 
    }

    location ~ /\. {
        deny all;
    }
}